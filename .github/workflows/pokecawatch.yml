name: Pokecawatch Telegram Bot

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pokecawatch-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      RUN_ONCE: "1"

      SEND_INDIVIDUAL_NOTIFICATIONS: "1"
      SEND_ON_FIRST_RUN: "1"

      SEND_DAILY_SUMMARY: "1"
      SUMMARY_DEDUP_BY_DAY: "1"
      SUMMARY_MAX_ITEMS_PER_MESSAGE: "10"
      SEND_EMPTY_SUMMARY: "0"

      DEBUG: "1"

      MAX_ARTICLES: "3"

      ACTIVE_ONLY: "1"
      NOTIFY_UPCOMING: "0"

      STRICT_CURRENT_MONTH: "0"
      END_ONLY_MAX_DAYS_AHEAD: "21"

      REQUEST_DELAY_SECONDS: "2"
      MESSAGE_DELAY_SECONDS: "3"
      TRANSLATION_DELAY_SECONDS: "0.7"

      TRANSLATE_ENABLED: "1"
      MAX_TRANSLATION_CHARS: "120"

      DB_PATH: "data/sent_lotteries.db"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot once
        run: python bot.py

      - name: Save sent database
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ ! -f data/sent_lotteries.db ]; then
            echo "Database not found, nothing to save."
            exit 0
          fi

          git add -f data/sent_lotteries.db

          if git diff --cached --quiet; then
            echo "No database changes to commit."
            exit 0
          fi

          git commit -m "Update sent lottery database"
          git pull --rebase origin main
          git push origin HEAD:main